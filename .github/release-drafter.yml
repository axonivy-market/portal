name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
template: |
  $CHANGES
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '⚠️ Changes'
    labels:
      - 'deprecated'
  - title: '📄 Documentation'
    labels:
      - 'docs'
      - 'documentation'
exclude-labels:
  - 'skip-changelog'
