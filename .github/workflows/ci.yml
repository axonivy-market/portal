name: Continuous Integration
run-name: 🔄 Continuous Integration

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  checks: read

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.8

      - name: Set up engine directory
        run: |
          ENGINE_DIR="${GITHUB_WORKSPACE}/ivy/engine"
          mkdir -p "$ENGINE_DIR"
          echo "ENGINE_DIR=$ENGINE_DIR" >> "$GITHUB_ENV"

      - name: Download Ivy engine
        run: |
          wget https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip -O "$ENGINE_DIR/engine.zip"
          unzip -o "$ENGINE_DIR/engine.zip" -d "$ENGINE_DIR"
          rm "$ENGINE_DIR/engine.zip"

      - name: Build Portal modules
        run: |
          set -o pipefail
          mvn clean install -f pom.xml -pl '!AxonIvyPortal/portal-test,!AxonIvyPortal/portal-selenium-test' \
            -Divy.engine.directory="$ENGINE_DIR" 2>&1 | \
            sed -E "s|[0-9]+\. (WARNING) in ([^ ]*) \(at line ([0-9]+)\)(.*)|::\L\1 file=\2,line=\3::build issue|g" | \
            sed -E "s|\[WARNING\] ${GITHUB_WORKSPACE}/([^:]+):\[([0-9]+),[0-9]+\] (.*)|::warning file=\1,line=\2::\3|g" | \
            sed -E "s|\[WARNING\] |::warning::|g" | \
            sed "s|::warning file=${GITHUB_WORKSPACE}/|::warning file=|g"

  compiler-warnings:
    name: Compiler Warnings
    runs-on: ubuntu-latest
    continue-on-error: true
    needs:
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check compiler warnings
        uses: actions/github-script@v9
        with:
          script: |
            const { checkCompilerWarnings } = require('./.github/scripts/warnings-awareness.cjs');
            await checkCompilerWarnings({ github, context, core });

  suppress-warnings:
    name: Suppress Warnings
    runs-on: ubuntu-latest
    continue-on-error: true
    needs:
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 100

      - name: Check SuppressWarnings usage
        uses: actions/github-script@v9
        with:
          script: |
            const { checkSuppressWarnings } = require('./.github/scripts/warnings-awareness.cjs');
            await checkSuppressWarnings({ github, context, core });
