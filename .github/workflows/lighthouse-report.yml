name: Lighthouse Audit
run-name: ♿ A11y Report
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  issues: write
  packages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
  discussions: write
  pages: write
on:
  workflow_dispatch:
    inputs:
      engineDownloadURL:
        description: |
          URL to download Axon Ivy Engine. Defaults to nightly build.
        type: string
        required: false
        default: 'https://developer.axonivy.com/permalink/sprint/axonivy-engine.zip'

env:
  ENGINE_DIR: ${{ github.workspace }}/ivy/engine/sprint

jobs:
  a11y-audit:
    runs-on: ubuntu-latest
    name: A11y Audit - ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      # -----------------------------------------------------------------------
      # Java + Maven
      # -----------------------------------------------------------------------
      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.8

      - name: Export Environment Variables
        run: |
          echo "export IVY_JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "export JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "export PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Engine setup
      # -----------------------------------------------------------------------
      - name: Prepare Engine Directory
        run: |
          mkdir -p "$ENGINE_DIR"
          sudo chown -R "$USER:$USER" "$ENGINE_DIR"

      - name: Download Engine
        run: |
          cd "$ENGINE_DIR"
          wget "${{ github.event.inputs.engineDownloadURL }}" -O axonivy-engine.zip
          unzip -o axonivy-engine.zip -d .
          rm axonivy-engine.zip

      # -----------------------------------------------------------------------
      # Build and deploy Portal artifacts
      # -----------------------------------------------------------------------
      - name: Build Portal Modules
        run: |
          mvn clean install -f pom.xml -Divy.engine.directory=$ENGINE_DIR

      - name: Build and Deploy Test Package
        run: |
          mvn clean package -f AxonIvyPortal/portal-selenium-test/deployment-pom.xml -Divy.engine.directory=$ENGINE_DIR
          DEPLOYMENT=$ENGINE_DIR/system/demo-applications/demo-portal
          mkdir -p $DEPLOYMENT
          rm -rf $DEPLOYMENT/*
          cp AxonIvyPortal/portal-selenium-test/target/*.zip $DEPLOYMENT

        # -----------------------------------------------------------------------
      # Run A11y tests via Maven (Ivy plugin manages engine + browser)
      # -----------------------------------------------------------------------
      - name: Run A11y Tests
        id: a11y
        continue-on-error: true
        run: |
          mkdir -p AxonIvyPortal/portal-selenium-test/target/axe-reports/ || true
          mvn clean test \
            -f AxonIvyPortal/portal-selenium-test/customized_pom.xml \
            -Divy.engine.download.url="${{ github.event.inputs.engineDownloadURL }}" \
            -Dtest="com.axonivy.portal.selenium.a11y.**" \
            -DbrowserType=FIREFOX \
            -Dcapabilities.unhandledPromptBehavior=accept \
            -DtrimStackTrace=false \
            -Divy.engine.directory=$ENGINE_DIR \
            -Divy.deploy.timeout.seconds=60 \
            -Divy.engine.start.timeout.seconds=500 \
            -Dsurefire.rerunFailingTestsCount=2

      - name: Generate Pretty HTML Report
        if: always()
        run: |
          npm install axe-html-reporter
          node -e "
          const fs = require('fs');
          const path = require('path');
          const { createHtmlReport } = require('axe-html-reporter');

          const targetDir = 'AxonIvyPortal/portal-selenium-test/target/';
          const files = fs.readdirSync(targetDir).filter(f => f.startsWith('axe-results-') && f.endsWith('.json'));
          
          if (files.length === 0) {
            console.log('No axe-results JSON files found.');
            process.exit(0);
          }

          // Combine results for a single report or generate multiple
          // createHtmlReport natively supports multiple files by just calling it multiple times or we can put them in axe-reports
          
          for (const file of files) {
            const raw = fs.readFileSync(path.join(targetDir, file), 'utf8');
            const data = JSON.parse(raw);
            createHtmlReport({
              results: data,
              options: {
                projectKey: file.replace('axe-results-', '').replace(/\.json$/, ''),
                outputDir: path.join(targetDir, 'axe-reports'),
                reportFileName: file.replace(/\.json$/, '.html')
              }
            });
            console.log('Generated HTML report for: ' + file);
          }
          "

      # -----------------------------------------------------------------------
      # Upload Surefire / screenshot artifacts
      # -----------------------------------------------------------------------
      - name: Upload Test Reports
        if: always()
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: |
            AxonIvyPortal/portal-selenium-test/target/surefire-reports/
            AxonIvyPortal/portal-selenium-test/target/selenide/reports
            AxonIvyPortal/portal-selenium-test/target/axe-reports/

      # -----------------------------------------------------------------------
      # GitHub Actions Job Summary
      # -----------------------------------------------------------------------
      - name: Write Job Summary
        if: always()
        run: |
          SUREFIRE_DIR="AxonIvyPortal/portal-selenium-test/target/surefire-reports"
          TESTS=0; FAILURES=0; ERRORS=0; SKIPPED=0
          if [ -d "$SUREFIRE_DIR" ]; then
            for f in "$SUREFIRE_DIR"/TEST-*.xml; do
              [ -f "$f" ] || continue
              TESTS=$((TESTS   + $(grep -oP 'tests="\K[0-9]+'   "$f" | head -1)))
              FAILURES=$((FAILURES + $(grep -oP 'failures="\K[0-9]+' "$f" | head -1)))
              ERRORS=$((ERRORS   + $(grep -oP 'errors="\K[0-9]+'   "$f" | head -1)))
              SKIPPED=$((SKIPPED  + $(grep -oP 'skipped="\K[0-9]+'  "$f" | head -1)))
            done
          fi
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          STATUS="${{ steps.a11y.outcome }}"
          ICON="✅"
          [ "$STATUS" = "failure" ] && ICON="❌"
          echo "## ♿ A11y Audit Results (WCAG 2.1 AA) ${ICON}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests run | ${TESTS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${SKIPPED} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Full Surefire XML, generated Axe HTML reports, and screenshots are available in the [artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-artifact.outputs.artifact-id }})." >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Fail the job if tests failed
      # -----------------------------------------------------------------------
      - name: Fail if violations found
        if: steps.a11y.outcome == 'failure'
        run: |
          echo "A11y tests found violations. See Surefire reports in the artifact."
          exit 1
