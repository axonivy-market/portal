name: Create Release Snapshot
run-name: 📦 Create Release Snapshot (${{ inputs.portalBranch || 'master' }})

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - feature/IVYPORTAL-20480-Build-Pipelines-ready-to-serve-LTS14  # TODO: remove before merge to master
  workflow_dispatch:
    inputs:
      portalBranch:
        description: 'Which branch of portal to test and build snapshot from?'
        required: false
        default: 'master'
        type: string
      engineDownloadURL:
        description: |
          URL to download engine:
            - https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip  (nightly master)
            - https://developer.axonivy.com/permalink/dev/axonivy-engine.zip  (dev master)
        required: false
        default: 'https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip'
        type: string
      deployToRepo:
        description: 'Deploy artifacts to Nexus snapshots? If false, only local install.'
        required: false
        default: true
        type: boolean
      skipVerification:
        description: 'Skip all verification stages and proceed directly to build and deploy.'
        required: false
        default: true
        type: boolean

permissions:
  actions: write
  contents: read

env:
  PORTAL_BRANCH: ${{ inputs.portalBranch || 'master' }}
  ENGINE_DOWNLOAD_URL: ${{ inputs.engineDownloadURL || 'https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip' }}

jobs:

  # ---------------------------------------------------------------------------
  # Resolve the latest commit SHA of the target branch.
  # All verify jobs use this SHA to confirm CI has passed for the exact commit
  # that will be deployed.
  # ---------------------------------------------------------------------------
  get-latest-sha:
    name: Get Latest Branch SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - name: Get latest SHA of branch
        id: get-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/commits/${{ env.PORTAL_BRANCH }}" --jq '.sha')
          echo "Latest ${{ env.PORTAL_BRANCH }} SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Verify that the portal-selenium-test workflow has a successful completed run
  # for the latest commit on the target branch.
  # ---------------------------------------------------------------------------
  verify-selenium-test:
    name: Verify Selenium Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skipVerification }}
    needs: get-latest-sha
    steps:
      - name: Verify Selenium Test passed for latest SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_SHA: ${{ needs.get-latest-sha.outputs.sha }}
        run: |
          echo "Fetching portal-selenium-test workflow runs for branch ${{ env.PORTAL_BRANCH }}..."
          RUNS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/portal-selenium-test.yml/runs?per_page=10&branch=${{ env.PORTAL_BRANCH }}" \
            --jq '.workflow_runs')

          MATCH=$(echo "$RUNS" | jq --arg sha "$LATEST_SHA" \
            '[.[] | select(.head_sha == $sha and .status == "completed")] | first')

          if [ -z "$MATCH" ] || [ "$MATCH" = "null" ]; then
            echo "::error::No completed selenium test run found matching SHA $LATEST_SHA on branch ${{ env.PORTAL_BRANCH }}."
            exit 1
          fi

          CONCLUSION=$(echo "$MATCH" | jq -r '.conclusion')
          RUN_NUMBER=$(echo "$MATCH" | jq -r '.run_number')
          HTML_URL=$(echo "$MATCH" | jq -r '.html_url')
          echo "Found matching selenium test run #$RUN_NUMBER → $HTML_URL"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Selenium test run #$RUN_NUMBER did not succeed. Conclusion was: $CONCLUSION"
            exit 1
          fi
          echo "✅ Selenium test run #$RUN_NUMBER was successful."

  # ---------------------------------------------------------------------------
  # Verify that the document-screenshot workflow has a successful completed run
  # for the latest commit on the target branch.
  # ---------------------------------------------------------------------------
  verify-screenshot:
    name: Verify Screenshot
    runs-on: ubuntu-latest
    if: ${{ !inputs.skipVerification }}
    needs: get-latest-sha
    steps:
      - name: Verify Screenshot workflow passed for latest SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_SHA: ${{ needs.get-latest-sha.outputs.sha }}
        run: |
          echo "Fetching portal-document-screenshot-test workflow runs for branch ${{ env.PORTAL_BRANCH }}..."
          RUNS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/portal-document-screenshot-test.yml/runs?per_page=10&branch=${{ env.PORTAL_BRANCH }}" \
            --jq '.workflow_runs')

          MATCH=$(echo "$RUNS" | jq --arg sha "$LATEST_SHA" \
            '[.[] | select(.head_sha == $sha and .status == "completed")] | first')

          if [ -z "$MATCH" ] || [ "$MATCH" = "null" ]; then
            echo "::error::No completed screenshot run found matching SHA $LATEST_SHA on branch ${{ env.PORTAL_BRANCH }}."
            exit 1
          fi

          CONCLUSION=$(echo "$MATCH" | jq -r '.conclusion')
          RUN_ID=$(echo "$MATCH" | jq -r '.id')
          HTML_URL=$(echo "$MATCH" | jq -r '.html_url')
          echo "Found matching screenshot run ID $RUN_ID → $HTML_URL"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Screenshot workflow run ID $RUN_ID did not succeed. Conclusion was: $CONCLUSION"
            exit 1
          fi
          echo "✅ Screenshot workflow run ID $RUN_ID was successful."

  # ---------------------------------------------------------------------------
  # Verify that the documentation workflow has a successful completed run
  # for the latest commit on the target branch.
  # ---------------------------------------------------------------------------
  verify-documentation:
    name: Verify Documentation
    runs-on: ubuntu-latest
    if: ${{ !inputs.skipVerification }}
    needs: get-latest-sha
    steps:
      - name: Verify Documentation workflow passed for latest SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_SHA: ${{ needs.get-latest-sha.outputs.sha }}
        run: |
          echo "Fetching portal-documentation workflow runs for branch ${{ env.PORTAL_BRANCH }}..."
          RUNS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/portal-documentation.yml/runs?per_page=10&branch=${{ env.PORTAL_BRANCH }}" \
            --jq '.workflow_runs')

          MATCH=$(echo "$RUNS" | jq --arg sha "$LATEST_SHA" \
            '[.[] | select(.head_sha == $sha and .status == "completed")] | first')

          if [ -z "$MATCH" ] || [ "$MATCH" = "null" ]; then
            echo "::error::No completed documentation run found matching SHA $LATEST_SHA on branch ${{ env.PORTAL_BRANCH }}."
            exit 1
          fi

          CONCLUSION=$(echo "$MATCH" | jq -r '.conclusion')
          RUN_ID=$(echo "$MATCH" | jq -r '.id')
          HTML_URL=$(echo "$MATCH" | jq -r '.html_url')
          echo "Found matching documentation run ID $RUN_ID → $HTML_URL"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Documentation workflow run ID $RUN_ID did not succeed. Conclusion was: $CONCLUSION"
            exit 1
          fi
          echo "✅ Documentation workflow run ID $RUN_ID was successful."

  # ---------------------------------------------------------------------------
  # Trigger the documentation workflow to build and optionally publish a
  # SNAPSHOT version to the repository, then wait for it to complete.
  # Runs after all verify jobs succeed (or are skipped via skipVerification).
  # ---------------------------------------------------------------------------
  build-documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [verify-selenium-test, verify-screenshot, verify-documentation]
    if: |
      always() &&
      (needs.verify-selenium-test.result == 'success' || needs.verify-selenium-test.result == 'skipped') &&
      (needs.verify-screenshot.result == 'success' || needs.verify-screenshot.result == 'skipped') &&
      (needs.verify-documentation.result == 'success' || needs.verify-documentation.result == 'skipped')
    steps:
      - name: Trigger documentation workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering portal-documentation.yml on branch ${{ env.PORTAL_BRANCH }}..."
          gh workflow run portal-documentation.yml \
            --ref "${{ env.PORTAL_BRANCH }}" \
            --field deploySnapshot="${{ inputs.deployToRepo != false }}"

      - name: Wait for documentation workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for workflow to start..."
          sleep 15

          RUN_ID=$(gh run list \
            --workflow=portal-documentation.yml \
            --branch="${{ env.PORTAL_BRANCH }}" \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not find the triggered documentation workflow run."
            exit 1
          fi

          echo "Documentation workflow run ID: $RUN_ID"
          echo "Waiting for completion (this may take several minutes)..."
          gh run watch "$RUN_ID" --exit-status

  # ---------------------------------------------------------------------------
  # Build and deploy all Portal modules.
  # Modules with canDeploy=true are deployed to Nexus snapshots when
  # deployToRepo is true; otherwise they are installed locally only.
  #
  # Module order mirrors the Jenkins pipeline:
  #   portal-components → portal → PortalKitTestHelper → portal-user-examples
  #   → portal-developer-examples → InternalSupport → portal-components-examples
  #   → portal-product → PortalApp → portal-demo-app
  # ---------------------------------------------------------------------------
  deploy-snapshot:
    name: Deploy Snapshot
    runs-on: ubuntu-latest
    needs: build-documentation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.PORTAL_BRANCH }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          server-id: 'nexus.axonivy.com'
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.12

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up engine directory
        run: |
          ENGINE_DIR="${GITHUB_WORKSPACE}/engine"
          mkdir -p "$ENGINE_DIR"
          echo "ENGINE_DIR=$ENGINE_DIR" >> "$GITHUB_ENV"

      - name: Download Ivy engine
        run: |
          wget "${{ env.ENGINE_DOWNLOAD_URL }}" -O "$ENGINE_DIR/engine.zip"
          unzip -o "$ENGINE_DIR/engine.zip" -d "$ENGINE_DIR"
          rm "$ENGINE_DIR/engine.zip"

      - name: Deploy snapshot modules
        env:
          MAVEN_USERNAME: ${{ secrets.NEXUS_AXONIVY_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.NEXUS_AXONIVY_PASSWORD }}
          DEPLOY_TO_REPO: ${{ inputs.deployToRepo != false }}
        run: |
          # Format: "module/path:canDeploy"
          MODULES=(
            "AxonIvyPortal/portal-components:true"
            "AxonIvyPortal/portal:true"
            "AxonIvyPortal/PortalKitTestHelper:false"
            "Showcase/portal-user-examples:true"
            "Showcase/portal-developer-examples:true"
            "Showcase/InternalSupport:false"
            "Showcase/portal-components-examples:true"
            "AxonIvyPortal/portal-product:true"
            "AxonIvyPortal/PortalApp:true"
            "Showcase/portal-demo-app:true"
          )

          for MODULE_ENTRY in "${MODULES[@]}"; do
            MODULE_PATH="${MODULE_ENTRY%%:*}"
            CAN_DEPLOY="${MODULE_ENTRY##*:}"

            if [ "$DEPLOY_TO_REPO" = "true" ] && [ "$CAN_DEPLOY" = "true" ]; then
              MAVEN_GOAL="deploy"
            else
              MAVEN_GOAL="install"
            fi

            echo "──────────────────────────────────────────────"
            echo "Building $MODULE_PATH  (goal: $MAVEN_GOAL)"
            echo "──────────────────────────────────────────────"
            mvn clean "$MAVEN_GOAL" \
              -Divy.engine.directory="$ENGINE_DIR" \
              -Divy.engine.version="[7.0.0,]" \
              -Divy.compiler.engine.start.timeout=120 \
              -Divy.engine.download.url="${{ env.ENGINE_DOWNLOAD_URL }}" \
              -f "$MODULE_PATH/pom.xml"
          done

      - name: Archive build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-artifacts
          retention-days: 5
          path: |
            **/target/*.iar
            AxonIvyPortal/PortalApp/target/*.zip
            Showcase/portal-demo-app/target/*.zip
            */*/pom.xml
          if-no-files-found: warn
