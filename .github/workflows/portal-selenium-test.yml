name: Portal Smoke Test
run-name: 🔆 Portal Smoke Test against ${{ inputs.engineUrl }}

# Standalone smoke-test workflow. Runs a curated subset of Portal Selenium
# tests against an externally provisioned engine that already has Portal +
# demo-portal deployed. See doc/customer-smoke-tests.md for the full guide.
# To customise tests, browser, or app name edit the hardcoded values below.

permissions:
  contents: read
  checks: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      engineUrl:
        description: 'Engine root URL (default: http://localhost:8080/)'
        type: string
        required: false
        default: 'http://localhost:8080/'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      ENGINE_APP: 'demo-portal'
      TEST_PATTERN: 'LoginTest,TopbarTest,MenuTest,UserHomepageTest,DashboardTaskWidgetTest,DashboardCaseWidgetTest,GlobalSearchTest,QuickSearchTest'
      BROWSER: 'FIREFOX'
      SELENIDE_REMOTE: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.8

      - name: Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        env:
          ENGINE_URL: ${{ inputs.engineUrl }}
        run: |
          chmod +x AxonIvyPortal/portal-selenium-test/run-smoke.sh
          ./AxonIvyPortal/portal-selenium-test/run-smoke.sh

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-reports
          retention-days: 10
          path: |
            AxonIvyPortal/portal-selenium-test/target/surefire-reports/*
            AxonIvyPortal/portal-selenium-test/target/selenide/reports/*

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v3.0.0
        with:
          name: Portal smoke tests
          path: 'AxonIvyPortal/portal-selenium-test/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          only-summary: 'false'
          fail-on-empty: 'false'

      - name: Fail the job if smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
