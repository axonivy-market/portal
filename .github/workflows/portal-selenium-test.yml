name: Portal Smoke Test
run-name: 🔆 Portal Smoke Test ${{ inputs.engineUrl == '' && '(auto-provisioned engine)' || format('against {0}', inputs.engineUrl) }}

# Smoke-test workflow. Runs the LoginTest + TopbarTest pair — enough to
# confirm Portal is alive on a fresh deployment. Two modes:
#   1. Default — leave engineUrl blank. Downloads the nightly Ivy engine,
#      builds PortalKitTestHelper and its dependencies, copies the three
#      iars into demo-applications/demo-portal/, starts the engine via the
#      Ivy build plugin, runs the smoke tests. Self-contained.
#   2. External — provide engineUrl. Skips auto-provisioning and runs
#      run-smoke.sh against the engine you specify (which must already have
#      Portal + the PortalKitTestHelper iar deployed under app demo-portal).
# See doc/customer-smoke-tests.md for the full handover guide.
# Broader test coverage isn't supported here — refer to Portal's full CI
# build artefacts.

permissions:
  contents: read
  checks: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      engineUrl:
        description: 'Engine root URL (leave blank to auto-provision an engine on the runner)'
        type: string
        required: false
        default: ''
      engineDownloadURL:
        description: 'Ivy engine zip URL (only used when engineUrl is blank)'
        type: string
        required: false
        default: 'https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      ENGINE_APP: 'demo-portal'
      TEST_PATTERN: 'LoginTest,TopbarTest'
      BROWSER: 'FIREFOX'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.8

      # Don't reinstall Firefox — the ubuntu-24.04 runner pre-installs the
      # MozillaTeam-PPA Firefox (a real binary). Running `apt-get install firefox`
      # would upgrade it to the snap transitional package, and the snap wrapper
      # at /usr/bin/firefox is not an executable geckodriver can launch
      # ("binary is not a Firefox executable").
      - name: Verify Firefox is available
        run: |
          firefox --version
          echo "Binary path: $(which firefox)"

      # ---- Auto-provision branch (engineUrl blank) ---------------------------
      - name: Set up engine directory
        if: ${{ inputs.engineUrl == '' }}
        run: |
          ENGINE_DIR="${GITHUB_WORKSPACE}/ivy/engine/nightly"
          mkdir -p "$ENGINE_DIR"
          echo "ENGINE_DIR=$ENGINE_DIR" >> "$GITHUB_ENV"

      - name: Download Ivy engine
        if: ${{ inputs.engineUrl == '' }}
        run: |
          cd "$ENGINE_DIR"
          wget -q "${{ inputs.engineDownloadURL }}" -O axonivy-engine.zip
          unzip -q -o axonivy-engine.zip -d .
          rm axonivy-engine.zip

      - name: Build PortalKitTestHelper and its dependencies
        if: ${{ inputs.engineUrl == '' }}
        run: |
          for module in \
            AxonIvyPortal/portal-components \
            AxonIvyPortal/portal \
            AxonIvyPortal/PortalKitTestHelper ; do
            mvn -B -ntp clean install -DskipTests -f "$module/pom.xml" -Divy.engine.directory="$ENGINE_DIR"
          done

      - name: Stage helper iars to engine
        if: ${{ inputs.engineUrl == '' }}
        run: |
          DEPLOYMENT="$ENGINE_DIR/system/demo-applications/demo-portal"
          mkdir -p "$DEPLOYMENT"
          rm -rf "$DEPLOYMENT"/*
          cp AxonIvyPortal/portal-components/target/portal-components-*.iar      "$DEPLOYMENT/"
          cp AxonIvyPortal/portal/target/portal-*.iar                            "$DEPLOYMENT/"
          cp AxonIvyPortal/PortalKitTestHelper/target/portalKitTestHelper-*.iar  "$DEPLOYMENT/"

      - name: Run smoke tests (auto-provisioned engine)
        if: ${{ inputs.engineUrl == '' }}
        id: smoke-auto
        continue-on-error: true
        run: |
          mvn -B -ntp clean test \
            -f AxonIvyPortal/portal-selenium-test/customized_pom.xml \
            -Dtest="${TEST_PATTERN}" \
            -DbrowserType="${BROWSER}" \
            -Dcapabilities.unhandledPromptBehavior=accept \
            -DtrimStackTrace=false \
            -Divy.engine.directory="$ENGINE_DIR" \
            -Divy.deploy.timeout.seconds=120 \
            -Divy.engine.start.timeout.seconds=180

      # ---- External-engine branch (engineUrl provided) -----------------------
      - name: Run smoke tests (external engine)
        if: ${{ inputs.engineUrl != '' }}
        id: smoke-ext
        continue-on-error: true
        env:
          ENGINE_URL: ${{ inputs.engineUrl }}
        run: |
          chmod +x AxonIvyPortal/portal-selenium-test/run-smoke.sh
          ./AxonIvyPortal/portal-selenium-test/run-smoke.sh

      # ---- Common reporting --------------------------------------------------
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-reports
          retention-days: 10
          path: |
            AxonIvyPortal/portal-selenium-test/target/surefire-reports/*
            AxonIvyPortal/portal-selenium-test/target/selenide/reports/*
            AxonIvyPortal/portal-selenium-test/target/testEngineOut.log

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v3.0.0
        with:
          name: Portal smoke tests
          path: 'AxonIvyPortal/portal-selenium-test/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          only-summary: 'false'
          fail-on-empty: 'false'

      - name: Fail the job if smoke tests failed
        if: ${{ steps.smoke-auto.outcome == 'failure' || steps.smoke-ext.outcome == 'failure' }}
        run: exit 1
