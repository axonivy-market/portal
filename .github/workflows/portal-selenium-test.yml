name: Portal Smoke Test
run-name: 🔆 Portal Smoke Test (auto-provisioned engine)

# Smoke-test workflow. Runs the LoginTest + TopbarTest pair — enough to
# confirm Portal is alive on a fresh deployment.
#
# Downloads a nightly Ivy engine onto the GitHub runner, builds
# PortalKitTestHelper and its dependencies, injects the three iars into
# the engine's demo-applications/demo-portal/, starts the engine via the
# Ivy build plugin, then runs the smoke tests. Self-contained — no
# external engine required.
#
# Customers with their own engine should run
# AxonIvyPortal/portal-selenium-test/run-smoke.sh from their own machine
# or CI instead — pointing GitHub at a customer engine usually isn't
# practical (firewalls, private networks).
#
# See doc/customer-smoke-tests.md for the full handover guide. Broader
# test coverage isn't supported here — refer to Portal's full CI build
# artefacts.

permissions:
  contents: read
  checks: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      engineDownloadURL:
        description: 'Ivy engine zip URL'
        type: string
        required: false
        default: 'https://developer.axonivy.com/permalink/nightly/axonivy-engine.zip'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      TEST_PATTERN: 'LoginTest,TopbarTest'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.8

      # Don't reinstall Firefox — the GitHub-hosted Ubuntu runner already
      # ships a real Firefox binary (currently from the MozillaTeam PPA).
      # Running `apt-get install firefox` can replace it with the snap
      # transitional package, whose wrapper at /usr/bin/firefox is not an
      # executable geckodriver can launch ("binary is not a Firefox executable").
      - name: Verify Firefox is available
        run: |
          firefox --version
          echo "Binary path: $(which firefox)"

      - name: Set up engine directory
        run: |
          ENGINE_DIR="${GITHUB_WORKSPACE}/ivy/engine/nightly"
          mkdir -p "$ENGINE_DIR"
          echo "ENGINE_DIR=$ENGINE_DIR" >> "$GITHUB_ENV"

      - name: Download Ivy engine
        run: |
          cd "$ENGINE_DIR"
          wget -q "${{ inputs.engineDownloadURL }}" -O axonivy-engine.zip
          unzip -q -o axonivy-engine.zip -d .
          rm axonivy-engine.zip

      - name: Build PortalKitTestHelper and its dependencies
        run: |
          for module in \
            AxonIvyPortal/portal-components \
            AxonIvyPortal/portal \
            AxonIvyPortal/PortalKitTestHelper ; do
            mvn -B -ntp clean install -DskipTests -f "$module/pom.xml" -Divy.engine.directory="$ENGINE_DIR"
          done

      - name: Inject helper iars into engine's demo-portal
        run: |
          DEPLOYMENT="$ENGINE_DIR/system/demo-applications/demo-portal"
          ZIP_FILE=$(ls "$DEPLOYMENT"/*.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No demo-portal ZIP found in $DEPLOYMENT — the nightly engine may have changed its packaging."
            exit 1
          fi
          echo "Injecting helper IARs into $ZIP_FILE"
          STAGING=$(mktemp -d)
          cp AxonIvyPortal/portal-components/target/portal-components-*.iar      "$STAGING/"
          cp AxonIvyPortal/portal/target/portal-*.iar                            "$STAGING/"
          cp AxonIvyPortal/PortalKitTestHelper/target/portalKitTestHelper-*.iar  "$STAGING/"
          cd "$STAGING"
          for iar in *.iar; do
            zip -u "$ZIP_FILE" "$iar"
          done
          rm -rf "$STAGING"

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: |
          mvn -B -ntp clean test \
            -f AxonIvyPortal/portal-selenium-test/customized_pom.xml \
            -Dtest="${TEST_PATTERN}" \
            -DbrowserType=FIREFOX \
            -Dcapabilities.unhandledPromptBehavior=accept \
            -DtrimStackTrace=false \
            -Divy.engine.directory="$ENGINE_DIR" \
            -Divy.deploy.timeout.seconds=120 \
            -Divy.engine.start.timeout.seconds=180

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-reports
          retention-days: 10
          path: |
            AxonIvyPortal/portal-selenium-test/target/surefire-reports/*
            AxonIvyPortal/portal-selenium-test/target/selenide/reports/*
            AxonIvyPortal/portal-selenium-test/target/testEngineOut.log

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v3.0.0
        with:
          name: Portal smoke tests
          path: 'AxonIvyPortal/portal-selenium-test/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          only-summary: 'false'
          fail-on-empty: 'false'

      - name: Fail the job if smoke tests failed
        if: ${{ steps.smoke.outcome == 'failure' }}
        run: exit 1
