      <li id="cite_note-8"><span class="mw-cite-backlink"><b><a href="#cite_ref-8" aria-label="Jump up" title="Jump up">^</a></b></span> <span class="reference-text"><a href="/wiki/Niklaus_Wirth" title="Niklaus Wirth">Niklaus Wirth</a> lo afirmó en varias ocasiones públicas, por ejemplo, en una conferencia en el Museo Politécnico de Moscú en septiembre de 2005. (several independent first-hand accounts in Russian exist, e.g. one with an audio recording: <link rel="mw-deduplicated-inline-style" href="mw-data:TemplateStyles:r1133582631"><cite id="CITEREFFilippova,_Elena2005" class="citation web cs1">Filippova, Elena (September 22, 2005). <a rel="nofollow" class="external text" href="http://www.delphikingdom.com/asp/viewitem.asp?catalogid=1155">"Conferencia de Niklaus Wirth en el Museo Politécnico de Moscú."</a>. <a rel="nofollow" class="external text" href="https://web.archive.org/web/20201201054813/http://www.delphikingdom.com/asp/viewitem.asp?catalogid=1155">Archived</a> del original el 1 de diciembre de 2020 <span class="reference-accessdate">. Recuperado <span class="nowrap">20 de noviembre,</span> 2011</span>.</cite><span title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Niklaus+Wirth%27s+lecture+at+the+Polytechnic+Museum+in+Moscow&amp;rft.date=2005-09-22&amp;rft.au=Filippova%2C+Elena&amp;rft_id=http%3A%2F%2Fwww.delphikingdom.com%2Fasp%2Fviewitem.asp%3Fcatalogid%3D1155&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AJava+%28programming+language%29" class="Z3988"></span>), que el equipo de diseño de Sun Java obtuvo la licencia del código fuente del compilador Oberon varios años antes del lanzamiento de Java y lo examinó: compacidad (relativa), seguridad de tipos, recolección de basura, ausencia de herencia múltiple para clases; todas estas características clave de diseño general son compartidas por Java y Oberon.</span>
      </li>
      <li id="cite_note-9"><span class="mw-cite-backlink"><b><a href="#cite_ref-9" aria-label="Jump up" title="Jump up">^</a></b></span> <span class="reference-text"><a href="/wiki/Patrick_Naughton" title="Patrick Naughton">Patrick Naughton</a> cites <a href="/wiki/Objective-C" title="Objective-C">Objective-C</a> as a strong influence on the design of the Java programming language, stating that notable direct derivatives include Java interfaces (derived from Objective-C's <a href="/wiki/Objective-C#Protocols" title="Objective-C">protocol</a>) and primitive wrapper classes. <a rel="nofollow" class="external autonumber" href="http://cs.gmu.edu/~sean/stuff/java-objc.html">[3]</a> <a rel="nofollow" class="external text" href="https://web.archive.org/web/20110713014816/http://cs.gmu.edu/~sean/stuff/java-objc.html">Archived</a> July 13, 2011, at the <a href="/wiki/Wayback_Machine" title="Wayback Machine">Wayback Machine</a></span>
