    description: Haga clic en Más información para ver la página de información personalizada del proceso.
    customProcessInfo: |-
      <h3><span class="mw-headline" id="Hello_world_example">Ejemplo hola mundo</span></h3>
      <p>El tradicional <a href="/wiki/%22Hello,_world!%22_program" class="mw-redirect" title="El programa &quot;¡Hola, mundo!&quot;">programa Hola mundo</a> puede ser escrito en Java como:<sup id="cite_ref-60" class="reference"><a href="#cite_note-60">[60]</a></sup>
      </p>
      <div class="mw-highlight mw-highlight-lang-java mw-content-ltr mw-highlight-lines" dir="ltr"><pre><span></span><span class="linenos" data-line="1"></span><span class="kd">public</span><span class="w"> </span><span class="kd">class</span> <span class="nc">Main</span><span class="w"> </span><span class="p">{</span>
      <span class="linenos" data-line="2"></span><span class="w">    </span><span class="kd">public</span><span class="w"> </span><span class="kd">static</span><span class="w"> </span><span class="kt">void</span><span class="w"> </span><span class="nf">main</span><span class="p">(</span><span class="n">String</span><span class="o">[]</span><span class="w"> </span><span class="n">args</span><span class="p">)</span><span class="w"> </span><span class="p">{</span>
      <span class="linenos" data-line="3"></span><span class="w">        </span><span class="n">System</span><span class="p">.</span><span class="na">out</span><span class="p">.</span><span class="na">println</span><span class="p">(</span><span class="s">"¡hola mundo!"</span><span class="p">);</span><span class="w"> </span><span class="c1">// Escribe la cadena a la consola.</span>
      <span class="linenos" data-line="4"></span><span class="w">    </span><span class="p">}</span>
      <span class="linenos" data-line="5"></span><span class="p">}</span>
      </pre></div>
      <p>Todos los archivos fuente deben nombrarse según la clase pública que contienen, agregando el sufijo<code>.java</code>, por ejemplo, <code>HelloWorldApp.java</code>. Primero debe compilarse en código de bytes, utilizando un <a href="/wiki/Java_compiler" title="Compilador de Java">compilador de Java</a>, produciendo un archivo con el sufijo <code>.class</code> (<code>Main.class</code>, en este caso). Solo entonces se puede ejecutar o lanzar. El archivo fuente de Java puede contener solo una clase pública, pero puede contener varias clases con un modificador de acceso no público y cualquier número de clases públicas. <a href="/wiki/Inner_class" title="Inner class">clases más interiores</a>. Cuando el archivo fuente contiene varias clases, es necesario hacer una clase (introducida por la palabra clave <code><b>class</b></code>) pública (precedida por la palabra clave <code><b>public</b></code>) y nombra el archivo fuente con ese nombre de clase pública.
      </p>
      <p>Una clase que no se declara pública puede almacenarse en cualquier archivo <code>.java</code>. El compilador generará un archivo de clase para cada clase definida en el archivo fuente. El nombre del archivo de clase es el nombre de la clase, con <i>.class</i> adjuntada. Para generación de archivo de clase, <a href="/wiki/Class_(computer_programming)#Unnamed" title="Class (computer programming)">clases anónimás</a> se tratan como si su nombre fuera la concatenación del nombre de su clase contenedora, un <i>$</i>, y un entero.
      </p>
      <p>La <a href="/wiki/List_of_Java_keywords" title="List of Java keywords">palabra clave</a> <code><b>public</b></code> denota que un método puede ser llamado desde código en otras clases, o que una clase puede ser utilizada por clases fuera de la jerarquía de clases.<sup id="cite_ref-FOOTNOTEBloch201873–77§Item_15_Minimize_the_accessibility_of_classes_and_members_61-0" class="reference"><a href="#cite_note-FOOTNOTEBloch201873–77§Item_15_Minimize_the_accessibility_of_classes_and_members-61">[61]</a></sup> La jerarquía de clases está relacionada con el nombre del directorio en el que se encuentra el archivo .java. Esto se denomina modificador de nivel de acceso. Otros modificadores de nivel de acceso incluyen las palabras clave <code><b>private</b></code> (un método al que solo se puede acceder dentro de la misma clase) y <code><b>protected</b></code> (lo cual permite el acceso al código del mismo paquete).<sup id="cite_ref-FOOTNOTEBloch201873–77§Item_15_Minimize_the_accessibility_of_classes_and_members_61-1" class="reference"><a href="#cite_note-FOOTNOTEBloch201873–77§Item_15_Minimize_the_accessibility_of_classes_and_members-61">[61]</a></sup> Si un fragmento de código intenta acceder a métodos privados o protegidos, la JVM lanzará una excepción <code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/SecurityException.html">SecurityException</a></code>.
      </p>
      <p>La palabra clave <code><b>static</b></code> delante de un método indica un <a href="/wiki/Method_(computer_programming)#Static_methods" title="Method (programación de computador)">static method</a>, la cual está asociada únicamente con la clase y no con ninguna instancia específica de esa clase. Solo se pueden invocar métodos estáticos sin una referencia a un objeto. Los métodos estáticos no pueden acceder a ningún miembro de una clase que no sea también estático. Los métodos que no están designados como estáticos son métodos de instancia y requieren una instancia específica de una clase para funcionar.
      </p>
      <p>La palabra clave <code><b>void</b></code> indica que el método principal no devuelve ningún valor como invocador. Si un programa Java debe salir con un código de error, debe invocar <code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/System.html#exit(int)">System.exit()</a></code> explícitamente.
      </p>
      <p>El nombre del método <code>main</code> no es una palabra clave en el lenguaje Java. Es simplemente el nombre del método que llama el iniciador de Java para pasar el control al programa. Clases Java que se ejecutan en entornos gestionados como applets y <a href="/wiki/Enterprise_JavaBeans" class="mw-redirect" title="Enterprise JavaBeans">Enterprise JavaBeans</a> no utilice ni necesite un método <code>main()</code>. Un programa Java puede contener varias clases que tienen métodos <code>main</code>, lo que significa que hay que indicarle explícitamente a la máquina virtual desde qué clase iniciar.
      </p>
      <p>El método principal debe aceptar una <a href="/wiki/Array_data_type" class="mw-redirect" title="Tipo de datos de matriz">matriz</a> de objeto <b><code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/19/docs/api/java.base/java/lang/String.html">String</a></code></b>. Por convención, se hace referencia a ello como <code><b>args</b></code> aunque se puede utilizar cualquier otro nombre de identificación legal. Desde Java&nbsp;5, el método principal también puede utilizarse <a href="/wiki/Variadic_function" title="Función Variadic">argumentos variables</a>, dentro de la forma de <code>public static void main(String... args)</code>, permitiendo que el método principal se invoque con un número arbitrario de argumentos <code>String</code>. El efecto de esta declaración alternativa es semánticamente idéntico (al parámetro <code>args</code>, que sigue siendo una matriz de objetos <code>String</code>), pero permite una sintaxis alternativa para crear y pasar la matriz.
      </p>
      <p>El lanzador de Java inicia Java cargando una clase determinada (especificada en la línea de comandos o como un atributo en un <a href="/wiki/JAR_(file_format)" title="JAR (formato de archivo)">JAR</a>) y comenzando su método <code>public static void main(String[])</code>. Los programas independientes deben declarar este método explícitamente. El parámetro <code>String[] args</code> es una matriz de objetos <code>String</code> que contiene cualquier argumento pasado a la clase. Los parámetros de <code>main</code> a menudo se pasan por medio de un <a href="/wiki/Command-line_interface" title="Command-line interface">línea de comando</a>.
      </p>
      <p>La impresión forma parte de la biblioteca estándar de Java: La clase <b><code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/19/docs/api/java.base/java/lang/System.html">System</a></code></b> define un campo estático público llamado <b><code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/19/docs/api/java.base/java/lang/System.html#out">out</a></code></b>. El objeto <code>out</code> es una instancia de la clase <code><a rel="nofollow" class="external text" href="https://docs.oracle.com/en/java/javase/19/docs/api/java.base/java/io/PrintStream.html">PrintStream</a></code> y proporciona muchos métodos para impresión de datos a <a href="/wiki/Standard_streams" title="Standard streams">salida estándar</a>, incluyendo <b><code><a rel="nofollow" class="external text" href="https://docs.oracle.com/es/java/javase/19/docs/api/java.base/java/io/PrintStream.html#println(java.lang.String)">println(String)</a></code></b> lo cual además adjunte una línea nueva al <a href="/wiki/String_(computer_science)" title="String (computer science)">string</a>.
      </p>
      <p>La cadena <code>"Hello World!"</code> está convertida automáticamente a un objeto String, por el compilador.
      </p>
