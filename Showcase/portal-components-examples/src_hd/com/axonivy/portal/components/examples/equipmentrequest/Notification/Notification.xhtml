<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10.xhtml">
    <ui:define name="title">Request Approved</ui:define>
    <ui:define name="content">
      <h:outputStylesheet library="css" name="equipment-request-examples.css" />

      <h:form id="equipment-request">
        <!-- Success hero -->
        <div class="flex flex-column align-items-center text-center p-5 mb-5 border-round-xl equipment-request-success-hero">
          <div class="flex align-items-center justify-content-center border-circle mb-3"
            style="width:4rem;height:4rem;background:var(--green-100)">
            <i class="ti ti-circle-check" style="font-size:2rem;color:var(--green-600)" />
          </div>
          <div class="text-2xl font-bold mb-1">Your Request Has Been Approved!</div>
          <div class="text-color-secondary">
            Your equipment request was reviewed and approved by your manager.
          </div>
        </div>

        <!-- Request summary -->
        <p:panel styleClass="card mb-4">
          <div class="flex align-items-center gap-2 mb-3 pb-2 border-bottom-1 surface-border">
            <i class="ti ti-clipboard-check text-color-secondary" />
            <span class="font-semibold text-lg">Request Summary</span>
          </div>

          <div class="flex align-items-center gap-3 py-3 border-bottom-1 surface-border">
            <span class="equipment-request-summary-label">
              <i class="ti ti-user" />Requester
            </span>
            <span class="font-medium">#{data.requester.displayName}</span>
          </div>
          <div class="flex align-items-center gap-3 py-3 border-bottom-1 surface-border">
            <span class="equipment-request-summary-label">
              <i class="ti ti-device-laptop" />Item Type
            </span>
            <span class="font-medium">#{data.requestData.itemType.getLabel()}</span>
          </div>
          <div class="flex align-items-start gap-3 py-3">
            <span class="equipment-request-summary-label">
              <i class="ti ti-file-description" />Reason
            </span>
            <span class="flex-1">#{data.requestData.reason}</span>
          </div>
        </p:panel>

        <!-- Action -->
        <div class="flex flex-row-reverse gap-2">
          <p:commandButton value="Finish" ariaLabel="Finish"
            icon="ti ti-check" iconPos="right"
            styleClass="primary-color-light-button"
            partialSubmit="true" actionListener="#{logic.close}"
            process=":equipment-request" update=":equipment-request" />
          <p:commandButton value="View History" ariaLabel="View History" type="button"
            icon="ti ti-history" styleClass="ui-button-outlined"
            onclick="PF('auditHistoryDialog').show()" />
        </div>

        <!-- Audit trail history dialog -->
        <p:dialog header="History" widgetVar="auditHistoryDialog" modal="true" responsive="true"
          closeOnEscape="true" resizable="false" width="720" styleClass="portal-dialog dialog-responsive">
          <ic:com.axonivy.portal.components.AuditTrail showHeader="false" />
        </p:dialog>
      </h:form>

      <ic:com.axonivy.portal.components.IFrameTaskConfig
        processSteps="#{portalComponentUtilsBean.convertToJSON(data.steps)}" currentProcessStep="2" />
    </ui:define>
  </ui:composition>
</h:body>
</html>
