<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10.xhtml">
    <ui:define name="title">Equipment Request</ui:define>
    <ui:define name="content">
      <h:outputStylesheet library="css" name="equipment-request-examples.css" />

      <h:form id="equipment-request">
        <!-- Page header -->
        <div class="flex align-items-center gap-3 mb-5">
          <div class="flex align-items-center justify-content-center border-circle"
            style="width:3rem;height:3rem;background:var(--primary-color)">
            <i class="ti ti-device-laptop" style="font-size:1.4rem;color:#fff" />
          </div>
          <div>
            <div class="text-2xl font-bold">Equipment Request</div>
            <div class="text-color-secondary text-sm mt-1">
              Submit a request for equipment and select your approving manager.
            </div>
          </div>
        </div>

        <!-- Requester banner -->
        <div class="flex align-items-center gap-2 p-3 border-round-lg mb-4 surface-100">
          <i class="ti ti-user-circle text-color-secondary" style="font-size:1.1rem" />
          <span class="text-color-secondary text-sm">Requesting as</span>
          <span class="font-semibold">#{ivy.session.getSessionUser().getDisplayName()}</span>
        </div>

        <!-- Form card -->
        <p:panel styleClass="card">
          <p:messages id="msg" styleClass="mb-4" closable="true" />

          <div class="grid">
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="item-type" value="Item Type" styleClass="font-medium" />
                <p:selectOneMenu id="item-type" value="#{data.requestData.itemType}"
                  required="true" styleClass="w-full mt-1"
                  requiredMessage="Item Type is required">
                  <f:selectItem itemLabel="Select an item..." itemValue="#{null}" noSelectionOption="true" />
                  <f:selectItems value="#{data.itemTypes}" var="type" itemLabel="#{type.getLabel()}" itemValue="#{type}" />
                </p:selectOneMenu>
              </div>
            </div>
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="reason" value="Reason" styleClass="font-medium" />
                <p:inputTextarea id="reason" value="#{data.requestData.reason}" required="true"
                  rows="3" styleClass="w-full mt-1" placeholder="Why do you need this equipment?"
                  requiredMessage="Reason is required" />
              </div>
            </div>
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="manager" value="Approving Manager" styleClass="font-medium" />
                <p:selectOneMenu id="manager" value="#{data.requestData.managerUsername}"
                  required="true" styleClass="w-full mt-1"
                  requiredMessage="Please select a manager">
                  <f:selectItem itemLabel="Select a manager..." itemValue="#{null}" noSelectionOption="true" />
                  <f:selectItems value="#{data.managers}" var="m" itemLabel="#{m.getDisplayName()}" itemValue="#{m.name}" />
                </p:selectOneMenu>
              </div>
            </div>
          </div>

          <div class="flex flex-row-reverse mt-3">
            <p:commandButton value="Submit Request" ariaLabel="Submit Request"
              icon="ti ti-send" iconPos="right"
              partialSubmit="true" actionListener="#{logic.close}"
              process=":equipment-request" update=":equipment-request:msg" />
          </div>
        </p:panel>
      </h:form>

      <ic:com.axonivy.portal.components.IFrameTaskConfig
        processSteps="#{portalComponentUtilsBean.convertToJSON(data.steps)}" currentProcessStep="0" />
    </ui:define>
  </ui:composition>
</h:body>
</html>
