<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10.xhtml">
    <ui:define name="title">Manager Approval</ui:define>

    <ui:define name="content">
      <h:outputStylesheet library="css" name="equipment-request-examples.css" />

      <h:form id="equipment-request">
        <h:panelGroup styleClass="ui-g ui-fluid portal-card-container">
          <div class="ui-g-12"></div>
          <p:panel styleClass="card ui-g-12 ui-md-12">
            <h4>A new equipment request needs your approval:</h4>
            <h:panelGroup styleClass="ui-g" layout="block">
              <p:messages styleClass="ui-g-12" />
              <h:panelGrid columns="1" columnClasses="ui-g-12" styleClass="ui-g-12">

                <h:panelGroup class="MarTop10">
                  <p:outputLabel for="requester" value="Requester" />
                  <p:inputText id="requester" disabled="true" value="#{data.requester.displayName}" styleClass="MarTop10" />
                </h:panelGroup>

                <h:panelGroup class="MarTop20">
                  <p:outputLabel for="item-type" value="Item Type" />
                  <p:inputText id="item-type" disabled="true" value="#{data.requestData.itemType.getLabel()}" styleClass="MarTop10" />
                </h:panelGroup>

                <h:panelGroup class="MarTop20">
                  <p:outputLabel for="urgency" value="Urgency" />
                  <p:inputText id="urgency" disabled="true" value="#{data.requestData.urgency.getLabel()}" styleClass="MarTop10" />
                </h:panelGroup>

                <h:panelGroup class="MarTop20">
                  <p:outputLabel for="reason" value="Reason" />
                  <p:inputTextarea id="reason" disabled="true" value="#{data.requestData.reason}" rows="3" styleClass="MarTop10" />
                </h:panelGroup>

                <h:panelGroup class="MarTop20">
                  <p:outputLabel for="justification" value="Justification" />
                  <p:inputTextarea id="justification" disabled="true" value="#{data.requestData.justification}" rows="3" styleClass="MarTop10" />
                </h:panelGroup>

              </h:panelGrid>
            </h:panelGroup>
          </p:panel>
        </h:panelGroup>

        <p:commandButton value="Approve" icon="ti ti-check"
          styleClass="Fright MarTop10" partialSubmit="true" id="approve-btn"
          actionListener="#{logic.approved}" process=":equipment-request" update=":equipment-request"
          style="width: auto" />
        <p:spacer width="5px" styleClass="Fright MarTop10" />
        <p:commandButton value="Reject" icon="ti ti-x" type="button"
          styleClass="secondary-btn Fright MarTop10" style="width: auto"
          onclick="PF('rejectionReasonDialog').show()" />

        <p:dialog id="rejection-dialog" widgetVar="rejectionReasonDialog" modal="true"
          header="Rejection Reason" width="480">
          <h:panelGrid columns="1" styleClass="ui-g-12">
            <p:outputLabel for="rejection-reason" value="Rejection Reason" />
            <p:inputTextarea id="rejection-reason" value="#{data.rejectionReason}" required="true" rows="4"
              styleClass="MarTop10" style="width:100%"
              requiredMessage="Rejection reason is required" />
            <p:commandButton value="Confirm Rejection" icon="ti ti-check"
              styleClass="MarTop10" actionListener="#{logic.rejected}"
              process=":equipment-request" update=":equipment-request" style="width: auto" />
          </h:panelGrid>
        </p:dialog>

      </h:form>
      <ic:com.axonivy.portal.components.IFrameTaskConfig processSteps="#{portalComponentUtilsBean.convertToJSON(data.steps)}" currentProcessStep="1" />

    </ui:define>
  </ui:composition>
</h:body>
</html>
