<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10.xhtml">
    <ui:define name="title">Update Request</ui:define>
    <ui:define name="content">
      <h:outputStylesheet library="css" name="equipment-request-examples.css" />

      <h:form id="equipment-request">
        <!-- Page header -->
        <div class="flex align-items-center gap-3 mb-4">
          <div class="flex align-items-center justify-content-center border-circle"
            style="width:3rem;height:3rem;background:var(--primary-color)">
            <i class="ti ti-refresh" style="font-size:1.4rem;color:#fff" />
          </div>
          <div>
            <div class="text-2xl font-bold">Update Your Request</div>
            <div class="text-color-secondary text-sm mt-1">
              Review the feedback below, update your request, and resubmit for approval.
            </div>
          </div>
        </div>
        <div class="pb-3">
          <ic:com.axonivy.portal.components.AuditTrail caze="#{ivy.wf.getCurrentCase()}" />
        </div>
        <!-- Rejection reason banner -->
        <div class="equipment-request-rejection-banner mb-5">
          <div class="flex align-items-center gap-2 mb-2">
            <i class="si si-alert-circle equipment-request-rejection-icon" style="font-size:1.1rem" />
            <span class="font-semibold equipment-request-rejection-title">Rejected by #{data.requestData.managerUsername}</span>
          </div>
          <p class="m-0 equipment-request-rejection-reason">Rejection reason: #{data.requestData.rejectionReason}</p>
        </div>

        <!-- Form card -->
        <p:panel styleClass="card">
          <p:messages id="msg" styleClass="mb-4" closable="true" />

          <div class="grid">
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="item-type" value="Item Type" styleClass="font-medium" />
                <p:selectOneMenu id="item-type" value="#{data.requestData.itemType}" disabled="true" required="true"
                  styleClass="w-full mt-1" requiredMessage="Item Type is required">
                  <f:selectItem itemLabel="Select an item..." itemValue="#{null}" noSelectionOption="true" />
                  <f:selectItems value="#{data.itemTypes}" var="type" itemLabel="#{type.getLabel()}"
                    itemValue="#{type}" />
                </p:selectOneMenu>
              </div>
            </div>
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="reason" value="Reason" styleClass="font-medium" />
                <p:inputTextarea id="reason" value="#{data.requestData.reason}" required="true" rows="3"
                  styleClass="w-full mt-1" requiredMessage="Reason is required" />
              </div>
            </div>
            <div class="col-12">
              <div class="field">
                <p:outputLabel for="manager" value="Approving Manager" styleClass="font-medium" />
                <p:selectOneMenu id="manager" value="#{data.requestData.managerUsername}" disabled="true"
                  required="true" styleClass="w-full mt-1" requiredMessage="Please select a manager">
                  <f:selectItem itemLabel="Select a manager..." itemValue="#{null}" noSelectionOption="true" />
                  <f:selectItems value="#{data.managers}" var="m" itemLabel="#{m.getDisplayName()}"
                    itemValue="#{m.name}" />
                </p:selectOneMenu>
              </div>
            </div>
          </div>

          <div class="flex flex-row-reverse mt-3">
            <p:commandButton value="Resubmit Request" ariaLabel="Resubmit Request" icon="ti ti-send" iconPos="right"
              partialSubmit="true" actionListener="#{logic.close}" process=":equipment-request"
              update=":equipment-request:msg" />
          </div>
        </p:panel>
      </h:form>

      <ic:com.axonivy.portal.components.IFrameTaskConfig
        processSteps="#{portalComponentUtilsBean.convertToJSON(data.steps)}" currentProcessStep="1" />
    </ui:define>
  </ui:composition>
</h:body>

</html>
