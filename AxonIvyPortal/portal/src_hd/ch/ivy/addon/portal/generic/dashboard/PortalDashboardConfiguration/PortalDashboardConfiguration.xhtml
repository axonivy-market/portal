<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
  xmlns:jsf="http://xmlns.jcp.org/jsf">
<h:body>
  <ui:composition template="/layouts/BasicTemplate.xhtml">
    <ui:param name="viewName" value="DASHBOARD_CONFIGURATION" />
    <ui:define name="title">#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/Title')}</ui:define>

    <ui:define name="css">
      <h:outputStylesheet library="css" name="dashboard.css" />
    </ui:define>

    <ui:define name="pageContent">
      <div class="ui-g dashboard-configuration-page">
        <div class="ui-g-12 ">
          <h:panelGroup id="configuration-group" styleClass="card ui-g" layout="block">
            <c:set var="isPublicDashboard" value="#{dashboardConfigurationBean.publicDashboard}" scope="request" />
            <c:set var="selectedDashboardTypeStyleClass" value="#{isPublicDashboard ? 'js-public-dashboard':'js-private-dashboard'}" scope="request"/>
            <div class="ui-g-12 u-no-padding-top u-no-padding-bottom">
              <div class="ui-g-12 dashboard-configuration__header">
                <h2>#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/Title')}</h2>
                <span>#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/Description')}</span>
              </div>

              <h:panelGroup id="dashboard-configuration-type" styleClass="ui-g-12" layout="block">
                <ul id="dashboard-type-list" class="dashboard-type-list">
                  <li class="#{not dashboardConfigurationBean.menuManagement and not isPublicDashboard ? 'active' : ''}" jsf:rendered="#{dashboardConfigurationBean.canEditPrivateDashboard}">
                    <i class="si si-single-neutral-shield u-mar-right-5"/>
                    <p:commandLink id="private-dashboard-type" ariaLabel="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/PrivateDashboard')}"
                      value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/PrivateDashboard')}"
                      actionListener="#{dashboardConfigurationBean.accessToEditDashboard(false)}"
                      update="dashboard-configuration-type dashboard-configuration-content menu-management-content" process="@this"
                      partialSubmit="true"/>
                  </li>
                  <li class="#{not dashboardConfigurationBean.menuManagement and isPublicDashboard ? 'active' : ''}" jsf:rendered="#{dashboardConfigurationBean.canEditPublicDashboard}">
                    <i class="si si-network-share u-mar-right-5"/>
                    <p:commandLink id="public-dashboard-type" ariaLabel="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/PublicDashboard')}"
                      value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/PublicDashboard')}"
                      actionListener="#{dashboardConfigurationBean.accessToEditDashboard(true)}"
                      update="dashboard-configuration-type dashboard-configuration-content menu-management-content" process="@this"
                      partialSubmit="true"/>
                  </li>
                  <li class="#{dashboardConfigurationBean.menuManagement ? 'active' : ''}">
                    <i class="si si-navigation-menu u-mar-right-5"/>
                    <p:commandLink id="menu-management-type" ariaLabel="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/MenuManagement')}"
                      value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/MenuManagement')}"
                      actionListener="#{dashboardConfigurationBean.accessToMenuManagement()}"
                      update="dashboard-configuration-type dashboard-configuration-content menu-management-content" process="@this"
                      partialSubmit="true"/>
                  </li>
                </ul>
              </h:panelGroup>
            </div>

            <h:panelGroup id="dashboard-configuration-content" layout="block">
              <h:panelGroup layout="block"
                rendered="#{!dashboardConfigurationBean.mobileDevice and !dashboardConfigurationBean.menuManagement}"
                styleClass="ui-g-12 dashboard-configuration__content u-no-padding-top #{isPublicDashboard ? 'js-public-dashboard-configuration':'js-private-dashboard-configuration'}">
                <h:panelGroup>
                  <div class="text-right ui-g-12">
                    <p:commandButton id="create-dashboard-action" actionListener="#{dashboardConfigurationBean.addNewDashboard(isPublicDashboard)}"
                      value="#{ivy.cms.co('/Dialogs/ch/ivy/addon/portal/generic/dashboard/PortalDashboardConfiguration/NewDashboard')}"
                      ariaLabel="#{ivy.cms.co('/Dialogs/ch/ivy/addon/portal/generic/dashboard/PortalDashboardConfiguration/NewDashboard')}"
                      styleClass="dashboard-action-container-icon #{selectedDashboardTypeStyleClass} w-full primary-color-light-button"
                      partialSubmit="true" global="false"
                      oncomplete="PF('create-new-dashboard-dialog').show(); resetPortalLeftMenuState()"
                      title="#{ivy.cms.co('/Dialogs/ch/ivy/addon/portal/generic/dashboard/PortalDashboardConfiguration/NewDashboard')}" />
                  </div>
                </h:panelGroup>
                <ui:fragment>
                  <ic:ch.ivy.addon.portal.generic.dashboard.component.DashboardModification id="dashboard-modification-component"
                    listenerOnBackAction="#{dashboardConfigurationBean.backToConfigurationTab()}"
                    componentToUpdateOnBackAction="dashboard-configuration-content"
                    isPublicDashboard="#{isPublicDashboard}" />
                </ui:fragment>
              </h:panelGroup>
            </h:panelGroup>

            <!-- Menu Management Content -->
            <h:panelGroup id="menu-management-content" layout="block">
              <h:panelGroup layout="block"
                rendered="#{!dashboardConfigurationBean.mobileDevice and dashboardConfigurationBean.menuManagement}"
                styleClass="ui-g-12 dashboard-configuration__content u-no-padding-top">
              <div class="col-12 flex flex-row-reverse">
                <h:form id="menu-management-form" class="w-full">
                  <p:commandButton id="create-menu-action" actionListener="#{menuDetailsBean.onCreateNewMenu(menuManagementBean.getLastIndex())}"
                      value="#{ivy.cms.co('/Dialogs/com/axonivy/portal/page/MenuManagement/AddNewMenu')}"
                      styleClass="dashboard-action-container-icon w-full primary-color-light-button"
                      partialSubmit="true" global="false"
                      update="#{p:resolveFirstComponentWithId('menu-configuration-dialog', view).clientId}"
                      oncomplete="PF('menu-configuration-dialog').show();"
                      title="#{ivy.cms.co('/Dialogs/com/axonivy/portal/page/MenuManagement/AddNewMenu')}"
                      ariaLabel="#{ivy.cms.co('/Dialogs/com/axonivy/portal/page/MenuManagement/AddNewMenu')}" />
                </h:form>
              </div>

              <h:panelGroup layout="block" id="menu-table-container" styleClass="col-12">
                <p:dataTable value="#{menuManagementBean.menuDefinitions}" var="menu" id="menu-table"
                  emptyMessage="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/noRecordsFound')}"
                  draggableRows="true" rowDragSelector="i.si-navigation-menu">
                  <p:ajax event="rowReorder" global="false" update="menu-table" listener="#{menuManagementBean.onRowReorder}"/>

                  <p:column headerText="#{ivy.cms.co('/Dialogs/com/axonivy/portal/page/MenuManagement/MenuTitle')}">
                    <h:outputText value="#{menuManagementBean.getDisplayMenuTitle(menu)}" />
                  </p:column>

                  <p:column headerText="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/description')}">
                    <h:outputText value="#{menu.description}" />
                  </p:column>

                  <p:column headerText="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/type')}" width="150">
                    <h:outputText value="#{menuManagementBean.getMenuKindLabel(menu.type)}" />
                  </p:column>

                  <p:column headerText="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/action')}"
                    width="100" styleClass="text-center">
                    <div class="w-full flex justify-content-center">
                      <p:commandButton id="menu-action-button" icon="fa fa-ellipsis-h"
                        rendered="#{menuManagementBean.hasAction(menu)}"
                        ariaLabel="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/action')}"
                        styleClass="rounded-button icon-more-menu-button ui-no-rounded-button-process-page" type="button" />
                        <p:menu id="menu-configuration-action-menu" styleClass="w-10rem" overlay="true" trigger="menu-action-button"
                          my="right top" at="right bottom">
                          <p:menuitem id="menu-edit" process="@this"
                            actionListener="#{menuDetailsBean.onEditMenu(menu)}"
                            icon="si si-graphic-tablet-drawing-pen" styleClass="dashboard-configuration-action-menu-icon"
                            update="menu-configuration-dialog" global="false"
                            oncomplete="PF('menu-configuration-dialog').show()"
                            target="_blank" resetValues="true"
                            title="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/edit')}"
                            value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/edit')}" />
                          <p:menuitem id="menu-delete" process="@this" styleClass="rounded-button ui-button-outlined ui-button-danger color-destroy"
                            rendered="#{menu.type ne 'STANDARD'}"
                            icon="si si-bin-1" actionListener="#{menuManagementBean.setSelectedMenuDefinition(menu)}" global="false"
                            update="remove-menu-dialog" oncomplete="PF('remove-menu-dialog').show()"
                            title="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/delete')}"
                            value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/delete')}" />
                        </p:menu>
                    </div>
                  </p:column>

                  <p:column styleClass="settings-table-reorder w-3rem">
                    <h:panelGroup styleClass="ui-button-outlined action-column-icon-button u-mar-right-5">
                      <i id="reorder-button-#{menu.id}" class="si si-navigation-menu dashboard-icon-drag-drop" />
                    </h:panelGroup>
                  </p:column>
                </p:dataTable>
              </h:panelGroup>
              </h:panelGroup>
            </h:panelGroup>
            <h:panelGroup layout="block" rendered="#{dashboardConfigurationBean.mobileDevice}" styleClass="ui-g-12">
              <h:outputText styleClass="ui-g-12" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/DashboardConfiguration/DoNotSupportMobile')}"/>
            </h:panelGroup>
          </h:panelGroup>

        </div>


      </div>
      <ic:ch.ivy.addon.portal.generic.dashboard.component.DashboardTemplateSelection id="dashboard-template-selection-component"
        listenerOnBackAction="#{dashboardConfigurationBean.backToConfigurationTab()}" componentToUpdateOnBackAction="dashboard-configuration-content"
        isPublicDashboard="#{dashboardConfigurationBean.publicDashboard}" />

      <!-- Menu Management Dialogs -->
      <ui:include src="MenuDetailsDialog.xhtml" />

      <ui:decorate template="/layouts/decorator/portal-dialog-with-icon.xhtml">
        <ui:param name="id" value="remove-menu-dialog" />
        <ui:param name="widgetVar" value="remove-menu-dialog" />
        <ui:param name="iconClass" value="si si-delete-1" />
        <ui:param name="appendTo" value="@(body)" />
        <ui:param name="closeable" value="true" />
        <ui:param name="closeOnEscape" value="true" />
        <ui:param name="iconStyleClass" value="portal-dialog-error-icon portal-dialog-icon" />
        <ui:param name="headerText"
          value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/dashboardManagement/deleteDashboardMessage',[menuManagementBean.getDisplayMenuTitle(menuManagementBean.selectedMenuDefinition)])}" />
        <ui:define name="dialogFooter">
          <div class="flex flex-column">
          <p:commandButton id="remove-menu-button" styleClass="w-full portal-remove-button"
            value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/delete')}"
            actionListener="#{menuManagementBean.removeMenu}"
            update="menu-table-container"
            oncomplete="location.reload();" />
          <p:link href="#" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/cancel')}"
            onclick="PF('remove-menu-dialog').hide();" styleClass="ui-button-flat pt-3 flex justify-content-center" />
          </div>
        </ui:define>
      </ui:decorate>
    </ui:define>
  </ui:composition>
</h:body>
</html>
