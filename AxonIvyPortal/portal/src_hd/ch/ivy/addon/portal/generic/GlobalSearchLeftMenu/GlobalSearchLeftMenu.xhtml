<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="jakarta.tags.core" xmlns:jsf="jakarta.faces">

<cc:interface componentType="IvyComponent">
</cc:interface>

<cc:implementation>
  <div id="global-search-container-in-page" class="search-item">
  <h:panelGroup styleClass="mobile-global-search-container">
    <p:inputText id="global-search-data" styleClass="global-search-input" value="#{data.keyword}"
      onkeypress="if (event.keyCode == 13) { portalGlobalSearchLeftMenu(); return false; }">
    </p:inputText>
    <p:outputLabel for="global-search-data" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/search')}" />
    <i class="global-search-icon ti ti-search" />
  </h:panelGroup>
  </div>
  <p:remoteCommand id="global-search-left-menu-remote-cmd" name="portalGlobalSearchLeftMenu" actionListener="#{logic.search}" />
</cc:implementation>
</html>
