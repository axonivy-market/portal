<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:jsf="http://xmlns.jcp.org/jsf"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

<p:commandButton id="start-task" styleClass="ui-button-flat dashboard-tasks__start-button" actionListener="#{dashboardTaskWidgetBean.handleStartTask(task)}" onclick="event.stopPropagation();"
  disabled="#{!taskActionBean.isNotDone(task) or !taskActionBean.canResume(task) or isPreviewMode or isResizing}" oncomplete="resetPortalLeftMenuState()"
  ariaLabel="#{ariaLabel}" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/common/start')}" icon="ti ti-player-play"
  process="@this">
</p:commandButton>
<p:tooltip for="start-task" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/taskStart')}" trackMouse="true"
  hideEvent="mouseleave click" />
</html>
