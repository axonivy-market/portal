<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:jsf="jakarta.faces"
  xmlns:c="jakarta.tags.core">

<p:commandLink id="start-task" actionListener="#{dashboardTaskWidgetBean.handleStartTask(task)}" onclick="event.stopPropagation();"
  disabled="#{!taskActionBean.isNotDone(task) or !taskActionBean.canResume(task)} or isPreviewMode or isResizing" oncomplete="resetPortalLeftMenuState()"
  ariaLabel="#{ariaLabel}"
  process="@this">
  <span class="ti ti-player-play" />
</p:commandLink>
<p:tooltip for="start-task" value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/taskStart')}" trackMouse="true"
  hideEvent="mouseleave click" />
</html>
