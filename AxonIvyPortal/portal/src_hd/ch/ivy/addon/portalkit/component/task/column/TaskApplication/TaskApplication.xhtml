<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="jakarta.tags.core">
<cc:interface componentType="IvyComponent">
  <cc:attribute name="componentId" default="task-application" />
  <cc:attribute name="task" required="true" shortDescription="Task" type="ch.ivyteam.ivy.workflow.ITask" />
  <cc:attribute name="responsiveStyleClass" />
</cc:interface>

<cc:implementation>
  <c:set var="task" value="#{cc.attrs.task}" />

  <h:panelGroup>
    <h:outputText id="#{cc.attrs.componentId}" styleClass="application-column #{cc.attrs.responsiveStyleClass}"
      value="#{task.application.name}" />
    <p:tooltip for="#{cc.attrs.componentId}" value="#{task.application.name}" trackMouse="true" hideEvent="mouseleave click" rendered="#{not empty task.application.name}" />
  </h:panelGroup>
</cc:implementation>

</html>
