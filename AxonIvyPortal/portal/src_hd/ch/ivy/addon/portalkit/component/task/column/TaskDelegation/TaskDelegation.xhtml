<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:cc="http://xmlns.jcp.org/jsf/composite"
    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
    xmlns:p="http://primefaces.org/ui">

  <cc:interface componentType="IvyComponent">
    <cc:attribute name="taskWidgetId"></cc:attribute>
    <cc:attribute name="task" required="true" type="ch.ivyteam.ivy.workflow.ITask" />
    <cc:attribute name="canDelegate" required="true" type="java.lang.Boolean" />
    <cc:attribute name="managedBean" required="true" />
    <cc:attribute name="selectedTasksForBulkDelegation" type="java.util.List" />
    <cc:attribute name="componentToUpdate"></cc:attribute>
  </cc:interface>

  <cc:implementation>
    <c:set var="task" value="#{cc.attrs.task}" />
    <c:set var="managedBean" value="#{cc.attrs.managedBean}" />
    <c:set var="selectedTasksForBulkDelegation" value="#{cc.attrs.selectedTasksForBulkDelegation}" />
    <c:set var="isSelected" value="" />
    <h:form id="delegation-form">
        <p:selectBooleanCheckbox value="#{managedBean.checkSelectedTaskForDelegation(task, selectedTasksForBulkDelegation)}"  disabled="#{!cc.attrs.canDelegate}">
            <p:ajax event="change" process="@this" update="@(.widget-header-default-actions) @(.delegation-action-bar)" listener="#{managedBean.onSelectDelegateTask(isSelected,task, selectedTasksForBulkDelegation)}"/>
        </p:selectBooleanCheckbox>false
    </h:form>

  </cc:implementation>

</html>
