<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions" xmlns:jsf="jakarta.faces">
  <i jsf:rendered="#{task.priority eq 'LOW'}" class="priority ti ti-circle-arrow-down low-priority" />
  <i jsf:rendered="#{task.priority eq 'NORMAL'}" class="priority ti ti-circle-arrow-right normal-priority" />
  <i jsf:rendered="#{task.priority eq 'HIGH'}" class="priority ti ti-circle-arrow-up high-priority" />
  <i jsf:rendered="#{task.priority eq 'EXCEPTION'}" class="priority ti ti-alert-circle exception-priority" />
</html>
