<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:cc="http://xmlns.jcp.org/jsf/composite"
    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
    xmlns:p="http://primefaces.org/ui">

  <cc:interface componentType="IvyComponent">
    <cc:attribute name="task" required="true" type="ch.ivyteam.ivy.workflow.ITask" />
    <cc:attribute name="isEnabled" required="true" type="java.lang.Boolean" />
    <cc:attribute name="managedBean" required="true" />
    <cc:attribute name="taskWidget" required="true" />
    <cc:attribute name="onSelectCheckbox" required="true" />

  </cc:interface>

  <cc:implementation>
    <c:set var="task" value="#{cc.attrs.task}" />
    <c:set var="managedBean" value="#{cc.attrs.managedBean}" />
    <c:set var="taskWidget" value="#{cc.attrs.taskWidget}" />
    <p:selectBooleanCheckbox id="checkbox" styleClass="js-task-checkbox js-task-checkbox-#{taskWidget.id}" value="#{bulkDelegateBean.taskCheckboxSelectionMap[taskWidget.id][task.uuid()]}" disabled="#{!cc.attrs.isEnabled and !bulkDelegateBean.taskCheckboxSelectionMap[taskWidget.id][task.uuid()]}">
        <p:ajax event="change" process="@this" update="@(.delegation-action-bar-#{taskWidget.id}) @(.js-task-checkbox-#{taskWidget.id})"
                listener="#{cc.attrs.onSelectCheckbox}"/>
    </p:selectBooleanCheckbox>

  </cc:implementation>

</html>
