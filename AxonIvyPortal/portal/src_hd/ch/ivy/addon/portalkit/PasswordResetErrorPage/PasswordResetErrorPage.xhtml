<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:cc="jakarta.faces.composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">
<!-- htmlSanitizerBean: com.axonivy.portal.components.bean.HtmlSanitizerBean -->
<cc:interface componentType="IvyComponent">
  <cc:attribute name="message" />
</cc:interface>

<cc:implementation>
  <div class="ui-g">
    <div class="ui-g-12 result-message">
      <h:outputText value="#{data.message}" />
    </div>
    <div class="ui-g-12">
      <p:button id="go-forgot-password-button" href="#"
        onclick="window.open('#{htmlSanitizerBean.escapeForJS(forgotPasswordBean.getForgotPasswordUrl())}', '_self')"
        value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/forgotPassword/goToForgotPassword')}"
        icon="#{visibilityBean.generateButtonIcon('ti ti-arrow-right')}" />
    </div>
  </div>
</cc:implementation>
</html>
