<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<cc:interface componentType="IvyComponent">
  <cc:attribute name="widget" />
  <cc:attribute name="managedBean" />
  <cc:attribute name="componentToUpdate" />
</cc:interface>

<cc:implementation>
  <c:set var="widget" value="#{cc.attrs.widget}" />
  <c:set var="managedBean" value="#{cc.attrs.managedBean}" />
  <!-- Configuration -->

  <h:panelGroup id="filter-container" layout="block" styleClass="information-widget-configuration" >
    <div class="filter-container">
      <div id="information-widget-configuration-header" class="filter-container__header">
        <h2>#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/configuration/configuration')}</h2>
        <p>#{ivy.cms.co('/Dialogs/com/axonivy/portal/dashboard/component/NewsWidgetConfiguration/NewsWidgetDescription')}</p>
      </div>
      <h:panelGroup id="widget-title-group">
      <div >
        <div >
          <p:outputLabel for="widget-title"
            value="#{ivy.cms.co('/ch.ivy.addon.portalkit.ui.jsf/dashboard/widgetTitle')}" />
        </div>
        <div class="ui-inputgroup">
          <p:inputText id="widget-title" styleClass="widget-configuration__input-text" value="#{widget.name}" />
           <!-- Add language button -->
          <p:commandButton styleClass="app-setting-button"
            icon="si si-chat-translate" id="add-language-button"
            actionListener="#{managedBean.updateWidgetNameByLocale()}"
            process="widget-title"
            update="#{cc.clientId}:title-language-config:multiple-languages-dialog"
            oncomplete="PF('multiple-languages-dialog').show();" />
        </div>
      </div>
      <h:form>
      <c:set var="defaultLang" value="#{InformationWidgetBean.defaultLanguage.toLanguageTag()}" />
      <p:tabView id="manage-information-tabview" value="#{informationWidgetBean.editingInformationList}" var="info" dynamic="true"
        widgetVar="manage-info-tabview" activeIndex="#{informationWidgetBean.activeTabIndex}">
        <c:set var="infoLanguage" value="#{info.locale.toLanguageTag()}" />
        <c:set var="requiredLanguage" value="#{defaultLang eq infoLanguage}" />
        <p:ajax event="tabChange" oncomplete="PF('manage-info-dialog').initPosition()"/>

        <p:tab title="#{requiredLanguage ? '* ':''}#{info.locale.displayLanguage}" 
          titleStyleClass="info-language-tab-#{infoLanguage}">
          <h:panelGroup id="manage-info-details-container" layout="block">
            <p:messages id="management-info-message" redisplay="false">
              <p:autoUpdate />
            </p:messages>

            <div class="management-info__title-group">
              <ic:ch.ivy.addon.portalkit.component.IconSelection id="info-icon" value="#{info.icon}"
                hideIconArray="true" />
              <div class="ui-fluid management-info__title-input ui-inputgroup">
                <p:inputText id="info-title" required="#{requiredLanguage and param['skipValidator'] == null}"
                  placeholder="title"
                  value="#{info.name}"
                  requiredMessage="#{ivy.cms.co('/Dialogs/com/axonivy/portal/dashboard/component/NewsWidget/NewsTitleValidateMessage', [info.locale.displayLanguage.toLowerCase()])}"
                  maxlength="200">
                  <p:ajax event="click" listener="#{informationWidgetBean.translateTitle(info.locale)}"
                    disabled="#{requiredLanguage}" process="@form"
                    partialSubmit="true" global="false" update="translated-text-panel, tranlate-link" />
                  <f:param name="skipValidator" value="true" />
                </p:inputText>
                <p:overlayPanel for="info-title" appendTo="@(body)" my="right top" at="right bottom"
                  id="overlay-panel-input"
                  styleClass="filter-name-overlay-panel #{requiredLanguage ? 'hidden' : ''}"
                  dynamic="false" dismissable="true" showCloseIcon="true">
                  <p:commandLink id="tranlate-link" update="@form" process="@this" partialSubmit="true"
                    actionListener="#{informationWidgetBean.resetTranslation()}"
                    disabled="#{not empty informationWidgetBean.warningText}">
                    <span class="fa fa-language language-icon-padding-right" />
                    <h:outputText value="Auto. translation" />
                  </p:commandLink>
                  <h:panelGroup id="translated-text-panel" layout="block">
                    <i id="translating-title"
                      class="#{empty informationWidgetBean.translatedText and empty informationWidgetBean.warningText ? 'pi pi-spin pi-spinner' : 'hidden'}"></i>
                    <p:outputPanel id="translated-title"
                      styleClass="#{empty informationWidgetBean.translatedText ? 'hidden' : ''}">#{informationWidgetBean.translatedText}</p:outputPanel>
                    <p:outputLabel id="warning-text" styleClass="#{empty informationWidgetBean.warningText ? 'hidden' : ''}">
                      <span class="ui-outputlabel-rfi">#{informationWidgetBean.warningText}</span>
                    </p:outputLabel>
                  </h:panelGroup>
                </p:overlayPanel>
              </div>
            </div>

            <div class="management-info__content-group">
              <p:textEditor id="info-content" height="300px" value="#{info.content}"
                placeholder=""
                required="#{requiredLanguage and param['skipValidator'] == null}"
                requiredMessage="#{ivy.cms.co('/Dialogs/com/axonivy/portal/dashboard/component/NewsWidget/NewsContentValidateMessage', [info.locale.displayLanguage.toLowerCase()])}">
                <f:validator validatorId="newsEditorValidator" />
                <f:facet name="toolbar">
                  <span class="ql-formats">
                    <button class="ql-bold"></button>
                    <button class="ql-italic"></button>
                    <button class="ql-underline"></button>
                    <button class="ql-strike"></button>
                    <p:commandButton
                      styleClass="ui-button-flat #{requiredLanguage ? 'hidden' : ''}"
                      id="translate-language-button" icon="si si-chat-translate si-lg"
                      title="#{ivy.cms.co('/Dialogs/com/axonivy/portal/dashboard/component/NewsWidget/Translate')}">
                      <p:ajax event="click"
                        listener="#{informationWidgetBean.translateContent(info.locale)}"
                        process="@form" update="info-content" />
                        <f:param name="skipValidator" value="true" />
                    </p:commandButton>
                  </span>
                </f:facet>
              </p:textEditor>
            </div>
          </h:panelGroup>
        </p:tab>
      </p:tabView>
      </h:form>
      
      </h:panelGroup>
    </div>
  </h:panelGroup>

  <!-- Multi language dialog-->
  <ic:ch.ivy.addon.portal.generic.dashboard.component.MultiLanguageConfiguration
    id="title-language-config" titles="#{managedBean.widget.names}"
    managedBean="#{managedBean}"
    componentToUpdateOnCreate="#{cc.attrs.componentToUpdate}" />
</cc:implementation>

</html>
