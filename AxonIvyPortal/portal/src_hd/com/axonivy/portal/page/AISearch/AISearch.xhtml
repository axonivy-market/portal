<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/BasicTemplate.xhtml">
    <ui:define name="title">AI Search</ui:define>
    <ui:define name="pageContent">
      <h:outputScript library="js" name="dashboard.js" />
      <h:outputStylesheet library="css" name="ai-search.css" />

      <h:form id="form">
        <p:messages id="messages" />

        <div class="grid mb-3">
          <div class="col-12">
            <h2 class="mt-0 mb-3">AI Search </h2>
            <div class="flex align-items-center gap-2">
              <span class="ui-input-icon-left flex-1">
                <i class="si si-search" />
                <p:inputText id="keyword" value="#{data.keyword}" styleClass="w-full ai-input"
                  placeholder="Enter keyword to search..."
                  onkeypress="if (event.keyCode == 13) { PF('searchBtn').jq.click(); return false; }">
                  <p:ajax event="input" delay="300" update="search-btn" />
                </p:inputText>
              </span>
              <p:commandButton id="search-btn" widgetVar="searchBtn" value="Search"
                disabled="#{empty data.keyword}"
                icon="si si-search" iconPos="left"
                action="#{aISearchBean.searchWithAI(data.keyword)}"
                update="form results-panel"
                onstart="$('.ai-input').addClass('ai-loading-input'); $('.ai-btn').addClass('ai-loading-button');"
                oncomplete="$('.ai-input').removeClass('ai-loading-input'); $('.ai-btn').removeClass('ai-loading-button'); setTimeout(function() { $(window).trigger('resize'); }, 200);"
                styleClass="ui-button-primary ai-btn" />
            </div>
          </div>
        </div>

        <!-- Rephrased query display -->
        <p:outputPanel id="rephrased-panel" rendered="#{aISearchBean.searched and not empty aISearchBean.rephrased}">
          <div class="flex align-items-center gap-2 p-2 mb-3 border-round surface-100">
            <i class="si si-information-circle text-primary" />
            <span>
              <strong>Interpreted as: </strong>
              <h:outputText value="#{aISearchBean.rephrased}" />
            </span>
            <p:badge id="confidence-badge"
              value="#{aISearchBean.confidence}"
              severity="#{aISearchBean.confidence ge 0.7 ? 'success' : 'warning'}"
              style="margin-left: auto;" />
          </div>
        </p:outputPanel>

      </h:form>

      <!-- Results table -->
      <p:outputPanel id="results-panel">
        <div class="grid">
          <div class="col-12">
            <p:tabView id="search-results-tabview" activeIndex="0" dynamic="true" cache="false">
              <p:ajax event="tabChange" oncomplete="setTimeout(function() { $(window).trigger('resize'); }, 100);" />
              <p:tab id="tasks-tab" title="Tasks (#{aISearchBean.taskCount})">
                <ic:ch.ivy.addon.portal.generic.dashboard.component.TaskWidget taskWidget="#{aISearchBean.taskWidget}" isReadOnlyMode="true" isAIResult="true"/>
              </p:tab>
              <p:tab id="cases-tab" title="Cases (#{aISearchBean.caseCount})">
                <ic:ch.ivy.addon.portal.generic.dashboard.component.CaseWidget caseWidget="#{aISearchBean.caseWidget}" isReadOnlyMode="true" isAIResult="true"/>
              </p:tab>
            </p:tabView>
          </div>
        </div>
      </p:outputPanel>

    </ui:define>
  </ui:composition>
</h:body>
</html>
