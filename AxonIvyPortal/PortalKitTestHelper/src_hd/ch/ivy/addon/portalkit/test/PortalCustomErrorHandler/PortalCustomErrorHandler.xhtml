<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/BasicTemplate.xhtml">
		<ui:param name="isNotRequiredLogin" value="false" />
		<ui:define name="pageContent">
          <h:form>
            <h:outputText value="Click to Test button to show Portal custom error handler" style="display:block;font-size:2em"/>
            <p:commandButton id="test-error-method" value="Test" actionListener="#{logic.errorMethod}" update="@form"/>
          </h:form>
        </ui:define>
	</ui:composition>
</h:body>
</html>
