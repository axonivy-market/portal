<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <h1>Create multiple test user</h1>
  <h:form>
    <p:panelGrid columns="2" layout="tabular">
      <p:outputLabel value="Enter hidden cases you want to create" />
      <p:inputText value="#{data.numberOfCases}" />
    </p:panelGrid>
    <p:panelGrid columns="1" layout="tabular">
      <h:outputText
        value="*** Note that 1 hidden cases contains 2 hidden tasks" />
      <p:commandButton value="Create hidden tasks and cases" actionListener="#{logic.close}" />
    </p:panelGrid>
  </h:form>
</h:body>
</html>
