<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui" xmlns:cc="http://xmlns.jcp.org/jsf/composite">

<cc:interface>
  <cc:attribute name="securityMember" required="true" />
  <cc:attribute name="id" type="java.lang.String" />
  <cc:attribute name="renderedAvatar" type="java.lang.Boolean" default="#{portalComponentAvatarBean.getPortalShowAvatarSettingOrDefault(true)}" />
  <cc:attribute name="useLowercaseEmail" type="java.lang.Boolean" default="true" shortDescription="Convert the email address to lowercase before looking up the avatar." />
  <cc:attribute name="representName" type="java.lang.String" />
  <cc:attribute name="showLabel" type="java.lang.Boolean" default="true" />

</cc:interface>

<cc:implementation>
  <h:outputStylesheet library="css" name="portal-components.css" />

  <!-- disable validator next-line: el-validator -->
  <p:avatar id="#{cc.attrs.id}" rendered="#{cc.attrs.renderedAvatar}"
    gravatar="#{cc.attrs.representName != null ? cc.attrs.representName : portalComponentAvatarBean.getEmailAddress(cc.attrs.securityMember, cc.attrs.useLowercaseEmail)}" gravatarConfig="d=blank"
    label="#{cc.attrs.showLabel ? (cc.attrs.representName != null ? cc.attrs.representName : portalComponentAvatarBean.getNameInitials(cc.attrs.securityMember.getDisplayName())) : ''}" styleClass="gravatar" shape="circle" />
</cc:implementation>
</html>
