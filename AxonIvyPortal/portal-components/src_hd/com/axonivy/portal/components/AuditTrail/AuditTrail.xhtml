<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

<cc:interface componentType="IvyComponent">
  <cc:attribute name="containerStyleClass" type="java.lang.String" default=""
    shortDescription="Additional CSS class for the outer container. Required: false." />
  <cc:attribute name="headerStyleClass" type="java.lang.String" default=""
    shortDescription="Additional CSS class for the header section. Required: false." />
  <cc:attribute name="tableStyleClass" type="java.lang.String" default=""
    shortDescription="Additional CSS class for the data table. Required: false." />
  <cc:attribute name="showHeader" type="java.lang.Boolean" default="true"
    shortDescription="Whether to display the header section. Required: false." />
  <cc:attribute name="contentColumnHeader" type="java.lang.String" default="Content"
    shortDescription="Header text for the content column. Required: false." />
  <cc:attribute name="authorColumnHeader" type="java.lang.String" default="Author"
    shortDescription="Header text for the author column. Required: false." />
  <cc:attribute name="timestampColumnHeader" type="java.lang.String" default="Timestamp"
    shortDescription="Header text for the timestamp column. Required: false." />
  <cc:attribute name="customHeader" type="java.lang.String" default="Audit Trail"
    shortDescription="Title text shown in the header section. Required: false." />
  <cc:attribute name="hideAddInformation" type="java.lang.Boolean" default="true"
    shortDescription="Whether to display the add-note action for appending information. Required: false." />
</cc:interface>

<cc:implementation>
  <h:outputStylesheet library="css" name="audit-trail-component.css" />
  <h:panelGroup id="audit-trail-content" layout="block"
    styleClass="audit-trail-container #{cc.attrs.containerStyleClass}">

    <h:panelGroup layout="block" styleClass="audit-trail-history-header #{cc.attrs.headerStyleClass}"
      rendered="#{cc.attrs.showHeader}">
      <div class="audit-trail-header-title">
        <i class="ti ti-clock audit-trail-history-icon" />
        <span class="audit-trail-title">#{cc.attrs.customHeader}</span>
      </div>
      <p:commandLink type="button" styleClass="audit-trail-add-link"
        rendered="#{!cc.attrs.hideAddInformation and data.isCasePersistent}"
        onclick="PF('addAuditInfoDialog').show()">
        <i class="ti ti-plus" />
        <span>Add information</span>
      </p:commandLink>
    </h:panelGroup>

    <p:dataTable id="history-table" widgetVar="historyTable" var="entry" value="#{data.auditTrailDTOs}" paginator="true" pageLinks="5" paginatorPosition="bottom" paginatorAlwaysVisible="false"
      emptyMessage="No data found." reflow="true" lazy="false" scrollable="true" scrollHeight="200"
      styleClass="audit-trail-history-table #{cc.attrs.tableStyleClass}">

      <p:column headerText="#{cc.attrs.contentColumnHeader}" styleClass="audit-trail-content-col">
        <h:outputText value="#{entry.content}" styleClass="audit-trail-note-content" />
      </p:column>

      <p:column headerText="#{cc.attrs.authorColumnHeader}" styleClass="audit-trail-author-col">
        <div class="audit-trail-author-cell">
          <div class="audit-trail-author-avatar">
            <i class="si si-single-neutral-actions" />
          </div>
          <span>#{entry.author}</span>
        </div>
      </p:column>

      <p:column headerText="#{cc.attrs.timestampColumnHeader}" sortBy="#{entry.timestamp}"
        styleClass="audit-trail-date-col">
        <h:outputText value="#{entry.timestamp}">
          <f:convertDateTime pattern="#{portalComponentUtilsBean.dateTimePattern}" />
        </h:outputText>
      </p:column>

    </p:dataTable>

    <p:dialog id="add-information-dialog" header="Add information" widgetVar="addAuditInfoDialog" modal="true" responsive="true"
      closeOnEscape="true" resizable="false" width="480" styleClass="audit-trail-add-dialog"
      rendered="#{!cc.attrs.hideAddInformation}">
      <div class="field">
        <p:inputTextarea id="add-info-input" value="#{data.additionalInformation}" rows="4"
          styleClass="audit-trail-add-input" placeholder="Add information here" />
      </div>
      <f:facet name="footer">
        <div class="flex block align-items-center flex-column">
          <p:commandButton styleClass="w-full" value="Add" ariaLabel="Add" actionListener="#{logic.addInformation}"
            process="add-information-dialog" oncomplete="PF('addAuditInfoDialog').hide(); refreshAuditTrailTable();" />
        </div>

      </f:facet>
    </p:dialog>
    <p:remoteCommand id="refresh-audit-trail-table" name="refreshAuditTrailTable" action="#{logic.getAuditTrailList()}" process="@this"
      update="history-table"></p:remoteCommand>
  </h:panelGroup>
</cc:implementation>

</html>
