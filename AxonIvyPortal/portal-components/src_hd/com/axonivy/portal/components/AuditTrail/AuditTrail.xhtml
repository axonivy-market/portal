<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

<cc:interface componentType="IvyComponent">
  <cc:attribute name="taskId" type="java.lang.Long" shortDescription="ID of the current task. Required: true." />
  <cc:attribute name="case"></cc:attribute>
  <cc:attribute name="containerStyleClass" type="java.lang.String" default=""
    shortDescription="Additional CSS class for the outer container. Required: false." />
</cc:interface>

<cc:implementation>
  <f:event listener="#{auditTrailBean.init(cc.attrs.taskId, cc.attrs.case)}" type="preRenderComponent" />
  <h:panelGroup id="audit-trail-content" layout="block" styleClass="audit-trail-container #{cc.attrs.containerStyleClass}">

    <h:form id="audit-trail-form">
      <!-- History Header -->
      <!-- <div class="flex align-items-center justify-content-between mb-3 audit-trail-history-header">
        <div class="flex align-items-center gap-2">
          <i class="ti ti-clock audit-trail-history-icon" />
          <span class="font-bold text-xl">History</span>
        </div>
      </div> -->

      <!-- History Table -->
      <p:dataTable id="history-table" widgetVar="historyTable" var="entry"
        value="#{auditTrailBean.auditTrailDTOs}"
        emptyMessage="No history found."
        reflow="true" lazy="false"
        styleClass="audit-trail-history-table w-full">

        <p:column headerText="Content" styleClass="audit-trail-content-col">
          <h:outputText value="#{entry.content}" styleClass="audit-trail-note-content" />
        </p:column>

        <p:column headerText="Related Case" styleClass="audit-trail-related-case-col"
          rendered="#{cc.attrs.case != null}">
          <span class="audit-trail-case-badge">
            <h:outputText value="##{cc.attrs.case.id} #{cc.attrs.case.names().current()}" />
          </span>
        </p:column>

        <p:column headerText="Author"
          styleClass="audit-trail-author-col">
          <div class="flex align-items-center gap-2">
            <div class="audit-trail-author-avatar flex align-items-center justify-content-center border-circle">
              <i class="si si-single-neutral-actions" />
            </div>
            <span>#{entry.author}</span>
          </div>
        </p:column>

        <p:column headerText="Creation date" sortBy="#{entry.timestamp}"
          styleClass="audit-trail-date-col u-hidden-sm-down">
          <h:outputText value="#{entry.timestamp}">
            <f:convertDateTime type="both" dateStyle="medium" timeStyle="short" />
          </h:outputText>
        </p:column>

      </p:dataTable>
    </h:form>

  </h:panelGroup>
</cc:implementation>

</html>
