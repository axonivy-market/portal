<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions"
  xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

<cc:interface componentType="IvyComponent">
  <cc:attribute name="case" shortDescription="The case whose notes are displayed. Required: true." />
  <cc:attribute name="customHeader" type="java.lang.String" default="Activity History"
    shortDescription="Optional header text displayed above the notes table. Required: false." />
  <cc:attribute name="containerStyleClass" type="java.lang.String" default=""
    shortDescription="Additional CSS class for the outer container. Required: false." />
</cc:interface>

<cc:implementation>
  <f:event listener="#{logic.getCaseNotes(cc.attrs.case)}" type="preRenderComponent" />
  <h:panelGroup id="audit-trail-content" layout="block" styleClass="audit-trail-container #{cc.attrs.containerStyleClass}">

    <div class="case-detail-section-title ui-g">
      <div class="u-truncate-text u-padding-0 audit-trail-section-title" role="heading" aria-level="2">
        <i class="ti ti-clock-check" />
        <span>#{cc.attrs.customHeader}</span>
      </div>
    </div>

    <p:dataTable id="audit-trail-table" value="#{data.caseNotes}" var="note"
        styleClass="audit-trail-table"
        paginator="true" rows="5" paginatorAlwaysVisible="false" paginatorPosition="bottom" pageLinks="3"
        paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
        emptyMessage=""
        rendered="#{not empty data.caseNotes}"
        sortBy="#{note.createdAt}">

      <p:column headerText="Note" styleClass="u-truncate-text audit-trail-col-content"
          sortBy="#{note.content}">
        <span class="audit-trail-note-content">#{note.content}</span>
      </p:column>

      <p:column headerText="Author" styleClass="case-document-author js-column-priority-2" width="200px"
          sortBy="#{note.authorName}">
        <i class="si si-single-neutral-actions audit-trail-note-author-icon" />
        <span>#{note.authorName}</span>
      </p:column>

      <p:column headerText="Date" styleClass="case-history-date js-column-priority-3" width="150px"
          sortBy="#{note.createdAt}">
        <h:outputText value="#{note.createdAt}">
          <f:convertDateTime type="both" dateStyle="medium" timeStyle="short" />
        </h:outputText>
      </p:column>

    </p:dataTable>

    <h:panelGroup layout="block" styleClass="ui-g-12 no-item-panel" rendered="#{empty data.caseNotes}">
      <i class="ti ti-info-circle" />
      <h:outputText styleClass="no-item-header" value="No notes available." />
      <h:outputText styleClass="no-item-detail" value="Notes added to this case will appear here." />
    </h:panelGroup>

  </h:panelGroup>
</cc:implementation>

</html>
